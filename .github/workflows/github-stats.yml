name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  push:
    branches:
      - main
  workflow_dispatch:        # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Check out the github-stats Python project ──────────────────────
      - name: Checkout jstrieb/github-stats source
        uses: actions/checkout@v3
        with:
          repository: jstrieb/github-stats
          ref: master
          path: github-stats-src

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          cd github-stats-src
          pip install -r requirements.txt

      # ── 4. Run the stats generator ────────────────────────────────────────
      - name: Generate stats SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: Dilshan-Mindika
          EXCLUDED: ""
          EXCLUDED_LANGS: ""
          INCLUDE_FORKED_REPOS: "false"
          EXCLUDE_CONTRIB_REPOS: "false"
          EXCLUDE_ARCHIVE_REPOS: "false"
          EXCLUDE_DISABLED_REPOS: "false"
          EXCLUDE_PRIVATE_REPOS: "false"
        run: |
          cd github-stats-src
          python stats.py

      # ── 5. Push generated SVGs to the `output` branch ────────────────────
      - name: Push SVGs to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./github-stats-src/generated
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "ci: update GitHub stats SVGs"

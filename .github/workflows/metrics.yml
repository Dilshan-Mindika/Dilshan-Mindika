name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Stats & Streak
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Dilshan-Mindika
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Colombo
          filename: github-stats.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update general metrics"
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: Isometric Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Dilshan-Mindika
          template: classic
          base: ""
          config_timezone: Asia/Colombo
          filename: github-isocalendar.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update isometric calendar"
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Dilshan-Mindika
          template: classic
          base: ""
          config_timezone: Asia/Colombo
          filename: github-languages.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update language metrics"
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
